services:
  db:
    image: postgres:15
    container_name: daftar-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daftar}
      POSTGRES_USER: ${POSTGRES_USER:-daftar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daftar}
    ports:
      - "5432:5432"
    volumes:
      - daftar_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: daftar-redis
    ports:
      - "6379:6379"

  backend:
    container_name: daftar-backend
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      USE_SQLITE: 0
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery:
    container_name: daftar-celery
    build:
      context: ./backend
    command: celery -A config worker -l info
    env_file:
      - ./.env
    environment:
      USE_SQLITE: 0
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db
    volumes:
      - ./backend:/app

  celery-beat:
    container_name: daftar-celery-beat
    build:
      context: ./backend
    command: celery -A config beat -l info
    env_file:
      - ./.env
    environment:
      USE_SQLITE: 0
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db
    volumes:
      - ./backend:/app

  frontend:
    container_name: daftar-frontend
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  daftar_pgdata:
